<div class="create-post-page">

  <!-- MAIN -->

  <div class="create-post-main">

    <!-- HEADER -->

    <div class="create-header">

      <h2>
        Create a New Post
      </h2>

      <p>
        Share your thoughts, feelings
        and experiences with the community.
      </p>

    </div>

    <!-- FORM -->

    <form
      [formGroup]="postForm"
      (ngSubmit)="createPost()"
      class="post-form"
    >

      <!-- CAPTION -->

      <div class="form-group">

        <label>
          What's on your mind?
        </label>

        <textarea

          formControlName="caption"

          placeholder="Write something..."

          rows="6"

        >
        </textarea>

      </div>

      <!-- MOOD + INTENT -->

      <div class="form-row">

        <!-- MOOD -->

        <div class="form-group">

          <label>
            Select Mood
          </label>

          <select
            formControlName="mood"
          >

            <option
              *ngFor="let mood of moods"
              [value]="mood"
            >

              {{ mood }}

            </option>

          </select>

        </div>

        <!-- INTENT -->

        <div class="form-group">

          <label>
            Select Intent
          </label>

          <select
            formControlName="intent"
          >

            <option
              *ngFor="let intent of intents"
              [value]="intent"
            >

              {{ intent }}

            </option>

          </select>

        </div>

      </div>

      <!-- IMAGE -->

      <div class="form-group">

        <label>
          Upload Image
        </label>

        <div class="upload-box">

          <input
            type="file"
            accept="image/*"
            (change)="onImageSelect($event)"
          />

          <p>
            Drag and drop or choose image
          </p>

        </div>

      </div>

      <!-- PREVIEW -->

      <div
        class="preview-wrapper"
        *ngIf="imagePreview"
      >

        <img
          [src]="imagePreview"
          alt="Preview"
          class="preview-image"
        />

      </div>

      <!-- ACTIONS -->

      <div class="post-actions">

        <button
          type="button"
          class="cancel-btn"
        >

          Cancel

        </button>

        <button
          type="submit"
          class="post-btn"
          [disabled]="isUploading"
        >

          {{ isUploading
              ? 'Posting...'
              : 'Post'
          }}

        </button>

      </div>

    </form>

  </div>

  <!-- RIGHT SIDEBAR -->

  <aside class="create-sidebar">

    <!-- TIPS -->

    <div class="sidebar-card">

      <h3>
        💡 Post Tips
      </h3>

      <ul>

        <li>
          Be authentic
        </li>

        <li>
          Spread positivity
        </li>

        <li>
          Respect others
        </li>

      </ul>

    </div>

    <!-- RECENT POSTS -->

    <div class="sidebar-card">

      <h3>
        Recent Posts
      </h3>

      <div class="recent-post">

        <strong>
          Ananya
        </strong>

        <p>
          Feeling grateful today 🌿
        </p>

      </div>

      <div class="recent-post">

        <strong>
          Rohan
        </strong>

        <p>
          Coding all night 💻
        </p>

      </div>

    </div>

  </aside>

</div>
