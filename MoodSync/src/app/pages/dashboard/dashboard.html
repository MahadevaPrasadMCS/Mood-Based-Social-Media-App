<div class="dashboard-container">
  <div class="dashboard-header-card">

    <!-- LEFT -->

    <div class="dashboard-info">

      <div class="dashboard-title">
        Dashboard
      </div>

      <div class="dashboard-subtitle">
        Posts that match your mood and intent
      </div>

    </div>

    <!-- RIGHT -->

    <div class="custom-filter-dropdown">

      <!-- SELECTED -->

      <div
        class="filter-trigger"
        (click)="toggleFilterDropdown()"
      >

        <div class="filter-left">

          <!-- ICON -->

          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
          >

            <path
              d="M4 7H20"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />

            <path
              d="M7 12H17"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />

            <path
              d="M10 17H14"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />

          </svg>

          <span>
                    {{ selectedFilter }}
                </span>

        </div>

        <!-- ARROW -->

        <span
          class="dropdown-arrow"
          [class.rotate]="isFilterDropdownOpen"
        >

                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                >

                    <path
                      d="M6 9L12 15L18 9"
                      stroke="currentColor"
                      stroke-width="2.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />

                </svg>

            </span>

      </div>

      <!-- OPTIONS -->

      <div
        class="filter-options"
        *ngIf="isFilterDropdownOpen"
      >

        @for (filter of searchFilters; track filter) {

        <div
          class="filter-option"
          (click)="selectFilter(filter)"
        >

          {{ filter }}

        </div>

        }

      </div>

    </div>

  </div>
  <div class="posts-wrapper">

    <app-post-card
    *ngFor="
      let post of filteredPosts
    "

    [postId]="post.id"
    
    [username]="
      post.user.userName
    "

    [userAvatar]="
      'https://i.pravatar.cc/100'
    "

    [mood]="
      post.mood
    "

    [content]="
      post.caption
    "

    [imageUrl]="
      post.imageUrl
    "

    [likes]="
      post.likes
    "

    [isLiked]="false"

  >
  </app-post-card>

  </div>
</div>
