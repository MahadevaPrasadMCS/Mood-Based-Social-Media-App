<div class="auth-shell">
  <div class="auth-overlay">

    <!-- LEFT CONTENT -->
    <aside class="panel-left">

      <!-- Logo -->
      <div class="brand">
        <div class="brand-logo">
          <div class="logo-circle"></div>
          <span class="brand-name">MoodSync</span>
        </div>
      </div>

      <!-- Text -->
      <div class="panel-copy">
        <h1>Welcome Back!</h1>
        <p>
          Log in to continue sharing your mood<br/>
          and connect with others.
        </p>

        <p class="panel-tagline">
          EXPRESS · CONNECT · BELONG
        </p>
      </div>

    </aside>

    <!-- RIGHT PANEL -->
    <main class="panel-right">

      <div class="auth-card">

        <div class="card-header">
          <h2>Log In to Your Account</h2>
          <p>Enter your credentials to continue</p><br>
        </div>

        <form (ngSubmit)="onSubmit()">

          <!-- EMAIL -->
          <div class="field-group">
            <label>Email Address</label>
            <input type="email" formControlName="email" placeholder="you@example.com"/>
          </div>

          <!-- PASSWORD -->
          <div class="field-group">
            <label>Password</label>
            <div class="password-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="••••••••"
              />
              <button type="button" (click)="togglePassword()">👁</button>
            </div>
          </div>

          <!-- REMEMBER -->
          <div class="form-extras">
            <label>
              <input type="checkbox" formControlName="rememberMe"/>
              Remember me
            </label>
            <a href="#">Forgot Password?</a>
          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn-primary">
            Log In →
          </button>

        </form>

        <p class="auth-switch">
          Already have an account?
          <a routerLink="/register" class="auth-switch-link">Sign Up</a>
        </p>

      </div>

    </main>

  </div>
</div>
