<div class="post-card">

  <!-- TOP -->

  <div class="post-header">

    <!-- USER -->

    <div class="user-info">

      <img
        [src]="userAvatar"
        alt="User"
        class="user-avatar"
      >

      <div class="user-details">

                <span class="username">
                    {{ username }}
                </span>

        <span class="mood-badge">
                    {{ mood }}
                </span>

      </div>

    </div>

  </div>

  <!-- CONTENT -->

  <div class="post-content">

    {{ content }}

  </div>

  <!-- IMAGE -->

  @if (imageUrl) {

  <div class="post-image-wrapper">

    <img
      [src]="imageUrl"
      alt="Post Image"
      class="post-image"
    >

  </div>

  }

  <!-- ACTIONS -->

  <div class="post-actions">

    <button
      class="like-btn"
      [class.liked]="isLiked"
      (click)="toggleLike()"
    >

      <!-- HEART ICON -->

      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
      >

        <path
          d="M12 21C12 21 4 16 4 9.5C4 6.46243 6.46243 4 9.5 4C11.1569 4 12.6771 4.89543 13.5 6.25C14.3229 4.89543 15.8431 4 17.5 4C20.5376 4 23 6.46243 23 9.5C23 16 15 21 15 21H12Z"
          stroke="currentColor"
          stroke-width="2"
          stroke-linejoin="round"
        />

      </svg>

      <span>
                {{ likes }}
            </span>

    </button>

  </div>

</div>
