<header class="header-container">

  <!-- LEFT SECTION -->

  <div class="logo-section">

    <img
      src="logo.png"
      alt="MoodSync"
      class="logo-icon"
    >

    <h2 class="logo-text">
      MoodSync
    </h2>

  </div>

  <!-- CENTER SECTION -->

  <div class="center-section">

    <!-- MOOD DROPDOWN -->

    <div class="custom-dropdown">

      <!-- Trigger -->

      <div
        class="dropdown-trigger"
        (click)="toggleMoodDropdown()"
      >

        <div class="emoji-circle">
          {{ selectedMood.icon }}
        </div>

        <div class="dropdown-text">

                    <span class="dropdown-label">
                        Mood:
                    </span>

          <strong>
            {{ selectedMood.label }}
          </strong>

        </div>

        <span
          class="dropdown-arrow"
          [class.rotate]="isMoodDropdownOpen"
        >
                     <svg
                       width="18"
                       height="18"
                       viewBox="0 0 24 24"
                       fill="none"
                     >
                        <path
                          d="M6 9L12 15L18 9"
                          stroke="currentColor"
                          stroke-width="2.5"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                    </svg>
                </span>

      </div>

      <!-- Menu -->

      <div
        class="dropdown-menu"
        *ngIf="isMoodDropdownOpen"
      >

        <div
          class="dropdown-item"
          *ngFor="let mood of moods"
          (click)="selectMood(mood)"
        >

                    <span class="item-icon">
                        {{ mood.icon }}
                    </span>

          <span>
                        {{ mood.label }}
                    </span>

        </div>

      </div>

    </div>

    <!-- INTENT DROPDOWN -->

    <div class="custom-dropdown">

      <!-- Trigger -->

      <div
        class="dropdown-trigger"
        (click)="toggleIntentDropdown()"
      >

        <div class="intent-ring">

          <div class="intent-dot"></div>

        </div>

        <div class="dropdown-text">

                    <span class="dropdown-label">
                        Intent:
                    </span>

          <strong>
            {{ selectedIntent.label }}
          </strong>

        </div>

        <span
          class="dropdown-arrow"
          [class.rotate]="isIntentDropdownOpen"
        >
                     <svg
                       width="18"
                       height="18"
                       viewBox="0 0 24 24"
                       fill="none"
                     >
                        <path
                          d="M6 9L12 15L18 9"
                          stroke="currentColor"
                          stroke-width="2.5"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                    </svg>
                </span>

      </div>

      <!-- Menu -->

      <div
        class="dropdown-menu"
        *ngIf="isIntentDropdownOpen"
      >

        <div
          class="dropdown-item"
          *ngFor="let intent of intents"
          (click)="selectIntent(intent)"
        >

                    <span>
                        {{ intent.label }}
                    </span>

        </div>

      </div>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

            <span class="search-icon">

                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                >

                    <circle
                      cx="11"
                      cy="11"
                      r="7"
                      stroke="currentColor"
                      stroke-width="2"
                    />

                    <path
                      d="M20 20L17 17"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                    />

                </svg>

            </span>

      <input
        type="text"
        class="search-input"
        placeholder="Search users or captions..."
        [(ngModel)]="searchText"
        (input)="onSearchChange()"
      />

    </div>

  </div>

  <!-- RIGHT SECTION -->

  <div class="actions-section">

    <!-- Notification -->

    <div class="notification-bell">

      🔔

      <span class="notification-badge">
                3
            </span>

    </div>

    <!-- Profile -->

    <div class="profile-group"
         (click)="toggleProfileDropdown(); $event.stopPropagation()">

      <img
        src="profile.jpg"
        alt="User"
        class="avatar"
      >

      <span class="profile-arrow">
                    <svg
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                    >
                        <path
                          d="M6 9L12 15L18 9"
                          stroke="currentColor"
                          stroke-width="2.5"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                    </svg>
            </span>

      <div
        class="profile-dropdown"
        *ngIf="isProfileDropdownOpen"
      >
        <div
          class="dropdown-item"
          (click)="loadProfile()"
        >
          View Profile
        </div>

        <div
          class="dropdown-item"
          (click)="onLogout()"
        >
          Logout
        </div>
      </div>
    </div>
  </div>
</header>
